<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读 · 闲人的小站</title>
    <!-- 加载 marked 库，把 markdown 转成 HTML -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #2d3e2b;
            padding: 40px 20px;
            font-family: Georgia, "Times New Roman", "宋体", serif;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .article-card {
            background: #fefaf0;
            border-radius: 28px;
            padding: 56px 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid #d4b48c;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 32px;
            color: #8b6b3d;
            text-decoration: none;
            font-family: sans-serif;
        }
        .back-link:hover {
            color: #4a6b38;
        }
        /* 这里是 Markdown 渲染后的样式 */
        .markdown-body {
            font-size: 1.18rem;
            line-height: 1.85;
            color: #2c3a22;
        }
        .markdown-body h1 {
            font-size: 2rem;
            color: #3b5a2c;
            border-left: 5px solid #b88b4a;
            padding-left: 20px;
            margin-bottom: 24px;
            font-weight: normal;
        }
        .markdown-body h2 {
            color: #4a6b38;
            margin: 32px 0 16px;
        }
        .markdown-body p {
            margin-bottom: 1.4rem;
            text-align: justify;
        }
        .markdown-body p:first-of-type::first-letter {
            font-size: 3.2rem;
            font-weight: bold;
            float: left;
            line-height: 1;
            margin-right: 10px;
            color: #7c9e6e;
        }
        .markdown-body hr {
            margin: 40px 0;
            border: none;
            height: 1px;
            background: #e0cfb0;
        }
        hr {
            margin: 48px 0 24px;
            border: none;
            height: 1px;
            background: #e0cfb0;
        }
        .footer {
            text-align: center;
            color: #b89a6a;
            font-size: 0.75rem;
            font-family: sans-serif;
            margin-top: 32px;
        }
        @media (max-width: 600px) {
            .article-card {
                padding: 32px 24px;
            }
            .markdown-body {
                font-size: 1rem;
                line-height: 1.7;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="article-card">
        <a href="javascript:history.back()" class="back-link">← 返回</a>
        <div id="content" class="markdown-body">加载中...</div>
        <hr>
        <div class="footer">—— 完 ——</div>
    </div>
</div>

<script>
    // 从 URL 参数获取文件名，比如 ?file=novel1.md
    const urlParams = new URLSearchParams(window.location.search);
    const file = urlParams.get('file');
    
    if (file) {
        fetch(file)
            .then(response => {
                if (!response.ok) throw new Error('文件不存在');
                return response.text();
            })
            .then(markdown => {
                // 使用 marked 库把 markdown 转成 HTML
                document.getElementById('content').innerHTML = marked.parse(markdown);
                // 修改页面标题
                const firstHeading = document.querySelector('#content h1');
                if (firstHeading) {
                    document.title = firstHeading.textContent + ' · 闲人的小站';
                }
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p style="color:red;">❌ 内容加载失败，请稍后再试</p>';
                console.error(err);
            });
    } else {
        document.getElementById('content').innerHTML = '<p>❌ 未指定文章</p>';
    }
</script>
</body>
</html>
